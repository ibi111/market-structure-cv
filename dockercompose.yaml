version: '3.8'

services:
  fvg-api:
    build: .
    container_name: fvg-detector-api
    ports:
      - "8000:8000"
    volumes:
      # Mount model weights from host keeps image lean
      - ./models:/app/models:ro
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3